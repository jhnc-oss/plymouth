stages:
  - build
  - shellcheck

.check-format: &check-format
  script:
    - scripts/check-format.sh

.meson-build: &meson-build
  script:
    - CFLAGS="-Wl,--no-undefined" meson _build
    - cd _build
    - ninja
    - meson test --print-errorlogs
    - ninja dist
    - shellcheck -S error scripts/plymouth-*

fedora-x86_64:
  stage: build
  image: 'registry.fedoraproject.org/fedora:37'
  before_script:
    - dnf install -y cpio gcc gtk3-devel git libpng-devel gettext-devel libxslt docbook-style-xsl cairo-devel systemd-devel systemd-udev kernel-headers libdrm-devel pango-devel make ShellCheck uncrustify patchutils meson binutils-gold xkeyboard-config-devel libevdev-devel
    - alternatives --set ld /usr/bin/ld.gold
  <<: [ *check-format, *meson-build ]
  only:
    - merge_requests

fedora-sanitizers-x86_64:
  extends: fedora-x86_64
  script:
    - dnf install -y libasan libubsan
    - meson setup _build-sanitizers -Db_sanitize=address,undefined
    - meson compile -C _build-sanitizers
    - ASAN_OPTIONS=detect_leaks=0:halt_on_error=1:abort_on_error=1 UBSAN_OPTIONS=halt_on_error=1:abort_on_error=1:print_stacktrace=1 meson test -C _build-sanitizers --print-errorlogs

fedora-coverage-x86_64:
  extends: fedora-x86_64
  script:
    - dnf install -y gcovr
    - meson setup _build-coverage -Db_coverage=true
    - meson compile -C _build-coverage
    - meson test -C _build-coverage --print-errorlogs
    - gcovr --root . --filter 'src/' --xml-pretty --output _build-coverage/meson-logs/coverage.xml _build-coverage
    - gcovr --root . --filter 'src/' --output _build-coverage/meson-logs/coverage.txt _build-coverage
    - "awk '/^TOTAL/ { print \"Line coverage: \" $NF }' _build-coverage/meson-logs/coverage.txt"
  coverage: '/^Line coverage: \d+(?:\.\d+)?%$/'
  artifacts:
    paths:
      - _build-coverage/meson-logs/coverage.txt
      - _build-coverage/meson-logs/coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: _build-coverage/meson-logs/coverage.xml

fedora-repeat-unit-tests-x86_64:
  extends: fedora-x86_64
  script:
    - meson setup _build-repeat
    - meson compile -C _build-repeat
    - meson test -C _build-repeat --suite unit --repeat 20 --print-errorlogs

fedora-qemu-initramfs-x86_64:
  stage: build
  image: 'registry.fedoraproject.org/fedora:latest'
  before_script:
    - dnf install -y gcc git libpng-devel gettext-devel systemd-devel systemd-udev meson ninja-build xkeyboard-config-devel libxkbcommon-devel libevdev-devel qemu-system-x86-core kernel-core dracut cpio ShellCheck
  script:
    - meson setup _build-qemu --prefix=/usr --libdir=lib64 -Ddocs=false -Dgtk=disabled -Dpango=disabled -Dfreetype=disabled -Ddrm=false
    - meson compile -C _build-qemu
    - shellcheck tests/qemu-init.sh tests/test-qemu-boot.sh
    - tests/test-qemu-boot.sh _build-qemu
  when: manual
  allow_failure: true

debian-unstable-x86_64:
  stage: build
  image: debian:unstable
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq -o APT::Immediate-Configure=false --no-install-recommends bc build-essential cpio docbook-xsl gcc gettext git libdrm-dev libgtk-3-dev libpango1.0-dev libpng-dev libudev-dev make pkg-config systemd-dev libsystemd-dev udev xsltproc shellcheck uncrustify patchutils meson xkb-data libevdev-dev
  <<: *meson-build
  only:
    - merge_requests
