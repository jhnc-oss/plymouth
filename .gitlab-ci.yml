stages:
  - build
  - shellcheck

.check-format: &check-format
  script:
    - scripts/check-format.sh

.meson-build: &meson-build
  script:
    - CFLAGS="-Wl,--no-undefined" meson _build
    - cd _build
    - ninja
    - meson test --print-errorlogs
    - ninja dist
    - shellcheck -S error scripts/plymouth-*

fedora-x86_64:
  stage: build
  image: 'registry.fedoraproject.org/fedora:37'
  before_script:
    - dnf install -y cpio gcc gtk3-devel git libpng-devel gettext-devel libxslt docbook-style-xsl cairo-devel systemd-devel systemd-udev kernel-headers libdrm-devel pango-devel make ShellCheck uncrustify patchutils meson binutils-gold xkeyboard-config-devel libevdev-devel
    - alternatives --set ld /usr/bin/ld.gold
  <<: [ *check-format, *meson-build ]
  only:
    - merge_requests

fedora-sanitizers-x86_64:
  extends: fedora-x86_64
  script:
    - dnf install -y libasan libubsan
    - meson setup _build-sanitizers -Db_sanitize=address,undefined
    - meson compile -C _build-sanitizers
    - ASAN_OPTIONS=detect_leaks=0:halt_on_error=1:abort_on_error=1 UBSAN_OPTIONS=halt_on_error=1:abort_on_error=1:print_stacktrace=1 meson test -C _build-sanitizers --print-errorlogs

debian-unstable-x86_64:
  stage: build
  image: debian:unstable
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq -o APT::Immediate-Configure=false --no-install-recommends bc build-essential cpio docbook-xsl gcc gettext git libdrm-dev libgtk-3-dev libpango1.0-dev libpng-dev libudev-dev make pkg-config systemd-dev libsystemd-dev udev xsltproc shellcheck uncrustify patchutils meson xkb-data libevdev-dev
  <<: *meson-build
  only:
    - merge_requests
